info:
  title: Melius API
  description: Melius backend API
  version: "1.0"
  contact:
    {}
tags:
  []
servers:
  []
components:
  schemas:
    LoginDto:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    Role:
      type: string
      enum:
        - user
        - doc
        - admin
    AuthResponseDto:
      type: object
      properties:
        role:
          allOf:
            -
              $ref: "#/components/schemas/Role"
        userId:
          type: number
      required:
        - role
        - userId
    RegisterLightDto:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        consentTerms:
          type: boolean
        consentAdult:
          type: boolean
        consentHealthData:
          type: boolean
      required:
        - email
        - consentTerms
        - consentAdult
        - consentHealthData
    SetPasswordDto:
      type: object
      properties:
        password:
          type: string
          minLength: 8
      required:
        - password
    OkResponseDto:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    Language:
      type: string
      enum:
        - pl
        - en
    CreateUserDto:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          allOf:
            -
              $ref: "#/components/schemas/Role"
        language:
          allOf:
            -
              $ref: "#/components/schemas/Language"
        consentTerms:
          type: boolean
        consentAdult:
          type: boolean
        consentHealthData:
          type: boolean
      required:
        - email
        - password
        - consentTerms
        - consentAdult
        - consentHealthData
    UserResponseDto:
      type: object
      properties:
        id:
          type: number
        role:
          allOf:
            -
              $ref: "#/components/schemas/Role"
        email:
          type: string
      required:
        - id
        - role
        - email
    UpdateUserDto:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    AvatarResponseDto:
      type: object
      properties:
        url:
          type: string
      required:
        - url
    ConfirmEmailDto:
      type: object
      properties:
        token:
          type: string
      required:
        - token
    EmailDto:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    ChangePasswordDto:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
      required:
        - token
        - password
    UpdateUserProfileDto:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        problems:
          minItems: 1
          type: array
          items:
            type: number
      required:
        - firstName
        - lastName
        - problems
    ProblemEntity:
      type: object
      properties:
        id:
          type: number
        problemKey:
          type: string
      required:
        - id
        - problemKey
    UserProfileResponseDto:
      type: object
      properties:
        userId:
          type: number
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        problems:
          type: array
          items:
            $ref: "#/components/schemas/ProblemEntity"
      required:
        - userId
        - firstName
        - lastName
        - problems
    Profession:
      type: string
      enum:
        - psychologist
        - psychotherapist
        - sexologist
    UpdateDocProfileDto:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        profession:
          allOf:
            -
              $ref: "#/components/schemas/Profession"
        unitAmount:
          type: number
          minimum: 50
          maximum: 1000
        currency:
          type: string
        specializations:
          minItems: 1
          type: array
          items:
            type: number
        docTermsAccepted:
          type: boolean
      required:
        - firstName
        - lastName
        - profession
        - specializations
    SpecializationEntity:
      type: object
      properties:
        id:
          type: number
        specializationKey:
          type: string
      required:
        - id
        - specializationKey
    DocVerificationStatus:
      type: string
      enum:
        - draft
        - submitted
        - approved
        - rejected
    DocProfileResponseDto:
      type: object
      properties:
        docId:
          type: number
        firstName:
          type: string
